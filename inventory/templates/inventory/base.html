<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Server Inventory{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        nav {
            background: #1a1a2e;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav .brand {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        nav .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        nav .nav-links a:hover { color: #fff; }

        .container {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .messages { margin-bottom: 1rem; }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: #1a1a2e; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        thead { background: #1a1a2e; color: #fff; }
        th, td { padding: 0.85rem 1rem; text-align: left; font-size: 0.9rem; }
        tbody tr:nth-child(even) { background: #f9f9f9; }
        tbody tr:hover { background: #f0f4ff; }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.65rem;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.running { background: #d4edda; color: #155724; }
        .badge.stopped { background: #f8d7da; color: #721c24; }

        .btn {
            display: inline-block;
            padding: 0.4rem 0.9rem;
            border: none;
            border-radius: 4px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-primary  { background: #1a1a2e; color: #fff; }
        .btn-success  { background: #28a745; color: #fff; }
        .btn-warning  { background: #ffc107; color: #333; }
        .btn-danger   { background: #dc3545; color: #fff; }
        .btn:hover    { opacity: 0.88; }

        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: #444;
        }

        input[type="text"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #1a1a2e;
            outline: none;
        }

        .errorlist {
            list-style: none;
            color: #dc3545;
            font-size: 0.82rem;
            margin-top: 0.3rem;
        }

        .card {
            background: #fff;
            border-radius: 6px;
            padding: 2rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            max-width: 480px;
        }
    </style>
</head>
<body>

<nav>
    <span class="brand">⚙ Server Inventory</span>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="{% url 'inventory:server_list' %}">Servers</a>
            <a href="{% url 'inventory:server_add' %}">+ Add Server</a>
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn" style="background:none; color:#e0e0e0; padding:0; cursor:pointer;">
                    Logout ({{ user.username }})
                </button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}
</div>

</body>
</html>
