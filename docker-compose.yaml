version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  migrate:
    build: .
    entrypoint: ["python", "manage.py", "migrate", "--noinput"]
    restart: no
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.docker

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.docker
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
    driver: local