LoadModule wsgi_module /usr/local/lib64/python3.9/site-packages/mod_wsgi/server/mod_wsgi-py39.cpython-39-x86_64-linux-gnu.so

WSGIDaemonProcess django python-path=/app
WSGIProcessGroup django
WSGIScriptAlias / /app/server_inventory/wsgi.py

Alias /static/ /app/staticfiles/

<Directory /app/server_inventory>
    <Files wsgi.py>
        Require all granted
    </Files>
</Directory>